<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #e0e0e0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 3rem 2.5rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            max-width: 520px;
            width: 90%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .shield {
            width: 80px; height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #ff4b6e, #ff6b8a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            box-shadow: 0 10px 30px rgba(255, 75, 110, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(255, 75, 110, 0.3); }
            50% { box-shadow: 0 10px 50px rgba(255, 75, 110, 0.5); }
        }
        .code {
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff4b6e, #ff9a56);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fff;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 0.5rem;
        }
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #ff4b6e, #ff9a56);
            border-radius: 2px;
            margin: 1.5rem auto;
        }
        .ip-info {
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="shield">&#128274;</div>
        <div class="code">403</div>
        <h1>Access Denied</h1>
        <p>Your IP address is not authorized to access this resource.</p>
        <p>Please contact an administrator if you believe this is an error.</p>
        <div class="divider"></div>
        <div class="ip-info">Attendee &bull; Protected Resource</div>
    </div>
</body>
</html>
