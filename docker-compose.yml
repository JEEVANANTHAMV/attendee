services:
  postgres:
    image: postgres:15-alpine
    restart: always
    networks:
      - attendee_net
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-attendee}
      POSTGRES_USER: ${POSTGRES_USER:-attendee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-attendee_secure_pass}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - attendee_net
    volumes:
      - redisdata:/data

  minio:
    image: quay.io/minio/minio
    restart: always
    networks:
      - attendee_net
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9001:9001" # MinIO Console
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  app:
    build: .
    restart: always
    extra_hosts:
      - "meet.innosynth.org:host-gateway"
    networks:
      - attendee_net
    command: gunicorn attendee.wsgi:application --bind 0.0.0.0:8000 --workers 4
    env_file: .env
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - .:/attendee
      - static_volume:/attendee/staticfiles

  worker:
    build: .
    restart: always
    user: root
    extra_hosts:
      - "meet.innosynth.org:host-gateway"
    networks:
      - attendee_net
    command: celery -A attendee worker -l INFO
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  bot-launcher:
    build: .
    restart: always
    user: root
    extra_hosts:
      - "meet.innosynth.org:host-gateway"
    networks:
      - attendee_net
    command: celery -A attendee worker -l INFO -Q bot_launcher_vm
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/attendee # Required for the container launcher to mount codebase

  nginx:
    image: nginx:alpine
    restart: always
    networks:
      - attendee_net
    ports:
      - "80:80"
    volumes:
      - ./nginx/attendee.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/403.html:/usr/share/nginx/html/403.html:ro
      - static_volume:/attendee/staticfiles:ro
    depends_on:
      - app

networks:
  attendee_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
  static_volume:
