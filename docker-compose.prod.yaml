services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-attendee}
      - POSTGRES_USER=${POSTGRES_USER:-attendee}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  app:
    build: .
    restart: always
    command: gunicorn attendee.wsgi:application --bind 0.0.0.0:8000 --workers 4
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=attendee.settings.production
      - DATABASE_URL=postgres://${POSTGRES_USER:-attendee}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-attendee}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - CREDENTIALS_ENCRYPTION_KEY=${CREDENTIALS_ENCRYPTION_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      # Email
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL}
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    restart: always
    command: celery -A attendee worker -l INFO
    environment:
      - DJANGO_SETTINGS_MODULE=attendee.settings.production
      - DATABASE_URL=postgres://${POSTGRES_USER:-attendee}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-attendee}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - CREDENTIALS_ENCRYPTION_KEY=${CREDENTIALS_ENCRYPTION_KEY}
      # Meeting Isolation
      - LAUNCH_BOT_METHOD=${LAUNCH_BOT_METHOD:-celery}
      - BOT_HOST_CODE_PATH=${BOT_HOST_CODE_PATH}
      - BOT_CONTAINER_IMAGE=${BOT_CONTAINER_IMAGE:-attendee_app:latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Required for docker-compose-multi-host
    depends_on:
      - postgres
      - redis

  # Special worker for launching ephemeral containers (if LAUNCH_BOT_METHOD=docker-compose-multi-host)
  bot-launcher:
    build: .
    restart: always
    command: celery -A attendee worker -l INFO -Q bot_launcher_vm
    environment:
      - DJANGO_SETTINGS_MODULE=attendee.settings.production
      - DATABASE_URL=postgres://${POSTGRES_USER:-attendee}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-attendee}
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - CREDENTIALS_ENCRYPTION_KEY=${CREDENTIALS_ENCRYPTION_KEY}
      - LAUNCH_BOT_METHOD=docker-compose-multi-host
      - BOT_HOST_CODE_PATH=${PWD}
      - BOT_CONTAINER_IMAGE=${BOT_CONTAINER_IMAGE:-attendee_app:latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/attendee # Mount current dir to /attendee for the container launcher to find files
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
